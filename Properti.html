#xhair{position:fixed;z-index:50;pointer-events:none;width:22px;height:22px;border:1.5px solid rgba(255,255,255,.12);border-radius:50%;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s,box-shadow .2s}

@media(max-width:768px){#cpanel{max-width:97%;max-height:92vh;top:48%;width:97%}#minimap{width:76px;height:76px;bottom:10px;left:10px}header h1{font-size:14px}#mode-btn{right:8px;width:36px;height:36px;font-size:13px}.plbl{font-size:9px;padding:2px 6px}.hrow{gap:4px}.hb{font-size:9px;padding:3px 7px}}

<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

/* ================================================================
   GALAXY SLIDE TRANSITION — dari code asli
   ================================================================ */
const GalaxySlide=(function(){
  let canvas,ctx,W,H;
  let stars=[],dust=[],sparkles=[];
  let animId=null,running=false;
  let startT=0,data=null;

  function init(){
    canvas=document.getElementById('slideCanvas');
    if(!canvas)return;
    ctx=canvas.getContext('2d');
  }

  function makeStars(){stars=[];for(let i=0;i<500;i++)stars.push({x:(Math.random()-.5)*2400,y:(Math.random()-.5)*2400,z:Math.random()*2000+100})}
  function makeDust(){dust=[];for(let i=0;i<70;i++)dust.push({angle:Math.random()*Math.PI*2,radius:Math.random()*280+30,speed:(Math.random()*.5+.1)*(Math.random()>.5?1:-1),size:Math.random()*1.3+.2,ba:Math.random()*.25+.04})}
  function makeSparkles(){sparkles=[];for(let i=0;i<8;i++)sparkles.push({x:(Math.random()-.5)*500,y:(Math.random()-.5)*350,size:Math.random()*2+.8,phase:Math.random()*Math.PI*2,freq:Math.random()*3+1.5})}

  function spd(t){if(t<.4)return 3+t*30;if(t<1.2)return 15+(t-.4)*44;if(t<2.8)return 50;if(t<3.5)return 50*(1-(t-2.8)/.7);return 0}
  function easeOut(t){return 1-Math.pow(1-t,3)}
  function fadeIn(t,s,d){return Math.max(0,Math.min(1,(t-s)/d))}
  function fadeOut(t,s,d){return 1-fadeIn(t,s,d)}
  function hexRGB(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}

  function start(slideData,onDone){
    if(running)return;running=true;data=slideData;
    W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;
    makeStars();makeDust();makeSparkles();
    startT=performance.now();canvas.style.display='block';
    function frame(){
      const t=(performance.now()-startT)/1000;render(t);
      if(t<3.8){animId=requestAnimationFrame(frame)}
      else{canvas.style.display='none';running=false;ctx.clearRect(0,0,W,H);if(onDone)onDone()}
    }
    animId=requestAnimationFrame(frame);
  }

  function render(t){
    const cx=W/2,cy=H/2,sp=spd(t);
    const cl=hexRGB(data.color),r=cl.r,g=cl.g,b=cl.b;
    const mob=W<600,fov=mob?200:300;
    ctx.fillStyle='#0C0A14';ctx.fillRect(0,0,W,H);

    for(let i=0;i<stars.length;i++){
      const s=stars[i],pz=s.z;s.z-=sp;
      if(s.z<1){s.x=(Math.random()-.5)*2400;s.y=(Math.random()-.5)*2400;s.z=2000}
      const sx=(s.x/s.z)*fov+cx,sy=(s.y/s.z)*fov+cy,px=(s.x/pz)*fov+cx,py=(s.y/pz)*fov+cy;
      if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
      const life=1-s.z/2000,alpha=Math.min(1,life*1.5),sz=Math.max(.2,life*2.5);
      const mr=Math.round(255+(r-255)*life*.3),mg=Math.round(255+(g-255)*life*.3),mb=Math.round(255+(b-255)*life*.3);
      if(sp>8){const sa=Math.min(.7,(sp-8)/30);ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.strokeStyle='rgba('+mr+','+mg+','+mb+','+(alpha*sa)+')';ctx.lineWidth=Math.max(.3,sz*.6);ctx.stroke()}
      ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fillStyle='rgba('+mr+','+mg+','+mb+','+alpha+')';ctx.fill();
    }

    const nebA=fadeIn(t,.2,.8);
    if(nebA>0){
      for(let n=0;n<4;n++){const na=t*.3+n*Math.PI/2,nd=100+n*40,nx=cx+Math.cos(na)*nd,ny=cy+Math.sin(na)*nd*.7,nr=Math.max(1,280-n*40);const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);ng.addColorStop(0,'rgba('+r+','+g+','+b+','+(0.12*nebA)+')');ng.addColorStop(.5,'rgba('+r+','+g+','+b+','+(0.04*nebA)+')');ng.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ng;ctx.fillRect(0,0,W,H)}
      for(let n=0;n<3;n++){const na2=t*.2+n*2.1+1,nd2=130+n*50,nx2=cx+Math.cos(na2)*nd2,ny2=cy+Math.sin(na2)*nd2*.6,nr2=Math.max(1,220-n*30);const ng2=ctx.createRadialGradient(nx2,ny2,0,nx2,ny2,nr2);ng2.addColorStop(0,'rgba(80,40,180,'+(0.07*nebA)+')');ng2.addColorStop(.5,'rgba(40,20,120,'+(0.03*nebA)+')');ng2.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ng2;ctx.fillRect(0,0,W,H)}
    }

    const ringT=fadeIn(t,.3,1.2),ringF=fadeOut(t,2.8,.8),ringA=ringT*ringF;
    if(ringA>0){
      const ringR=easeOut(ringT)*Math.min(W,H)*.38;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(t*.4);ctx.scale(1,.3);

        const sp=sparkles[i],spBr=(Math.sin(t*sp.freq+sp.phase)+1)/2,spx=cx+sp.x,spy=cy+sp.y,spAl=sparkA*spBr*.6,spSz=sp.size*(.5+spBr*.5);

  }

})();

/* ================================================================
   GALAXY SLIDE — fungsi wrapper untuk semua trigger point
   ================================================================ */
function playGalaxySlide(slideIdx,targetId,direction){
  if(isTransitioning)return;
  isTransitioning=true;
  Snd.ia();Snd.whoosh();

  /* Tutup panel kartu jika terbuka */
  if(cardOpen){cbg.classList.remove('show');cpanel.classList.remove('show');cardOpen=false;selectedId=null}

  const sd={...slideData[slideIdx],direction};
  GalaxySlide.start(sd,function(){
    isTransitioning=false;
    openCard(targetId,true);
    const pp=planets.find(pl=>pl.it.id===targetId);
    if(pp)flyTo(pp.mesh.position);
  });
}

/* Cek apakah perlu slide saat masuk ke kelompok tertentu */
function needsSlideForGroup(gIdx){
  /* Slide hanya jika sedang TIDAK berada di kelompok tersebut */
  const currentGIdx=selectedId>=0?getItemGroupIdx(selectedId):-1;
  return currentGIdx!==gIdx;
}

function applyCardCSS(id,val){const it=findIt(id);if(!it)return;const av=getActualVal(id);const el=document.getElementById('tgt-'+id);const note=document.getElementById('note-'+id);if(id===11){const dm=document.getElementById('demo-11');if(dm)dm.outerHTML=renderDemo(findIt(id))}else if(it.tp==='child'){if(el)el.style.cssText=(it.cb||'')+it.p+':'+av+';';if(note)note.style.display=(it.p==='display'&&av==='none')?'':'none'}else if(it.tp==='inline'){const spans=document.querySelectorAll('.inl-'+id);for(let i=0;i<spans.length;i++)spans[i].style.display=av}else if(it.tp==='fc'||it.tp==='fx'){if(el)el.style.setProperty(it.p,av)}else{if(el)el.style.cssText=(it.b||'')+it.p+':'+av+';'}const hdr=document.getElementById('chdr-'+id);if(hdr){if(av!==orig[id])hdr.classList.add('mod');else hdr.classList.remove('mod')}const code=document.getElementById('ccode-'+id);if(code){code.textContent=getDisplayVal(id);code.parentElement.title=getActualVal(id)}reactPlanet(id,av)}

function reactPlanet(id,val){const pp=planets.find(pl=>pl.it.id===id);if(!pp)return;const m=pp.mesh,mat=m.material,ud=m.userData;const prop=findIt(id).p;if(prop==='color'||prop==='background-color'){try{const c=new THREE.Color(val);mat.color.copy(c).multiplyScalar(.6);mat.emissive.copy(c)}catch(e){}}if(prop==='border-radius'){const px=parseFloat(val);if(!isNaN(px))m.scale.setScalar(Math.max(.3,ud.baseScale*(1+px/100)))}if(prop==='flex-grow'||prop==='flex-shrink'){const n=parseFloat(val);if(!isNaN(n))m.scale.setScalar(Math.max(.3,Math.min(3,ud.baseScale*(1+n*.25))))}if(prop==='text-shadow'||prop==='box-shadow')mat.emissiveIntensity=Math.min(2,ud.baseEmissive+(val==='none'?0:1));if(prop==='font-size'){const n=parseFloat(val);if(!isNaN(n))m.scale.setScalar(Math.max(.3,Math.min(2.5,ud.baseScale*(.5+n/40))))}if(prop==='opacity'){const n=parseFloat(val);if(!isNaN(n)){mat.opacity=Math.max(.1,Math.min(1,n));mat.transparent=true}}if(val!==orig[id])mat.emissiveIntensity=Math.max(mat.emissiveIntensity,ud.baseEmissive+.4);else{mat.emissiveIntensity=ud.baseEmissive;mat.color.copy(ud.origColor).multiplyScalar(.6);m.scale.setScalar(ud.baseScale);mat.opacity=1;mat.transparent=false}Snd.pulse()}

window._clickChip=function(id,val){curVals[id]=val;if(uploadedImages[id])delete uploadedImages[id];const inp=document.getElementById('cinput-'+id);if(inp)inp.value=val;applyCardCSS(id,val)};
window._resetOne=function(id){curVals[id]=orig[id];if(uploadedImages[id])delete uploadedImages[id];const inp=document.getElementById('cinput-'+id);if(inp)inp.value=orig[id];applyCardCSS(id,orig[id]);window._toast('Properti #'+id+' direset')};
window._handleUpload=function(id,input){if(input.files&&input.files[0]){const fn=input.files[0].name;const r=new FileReader();r.onload=function(e){const url='url("'+e.target.result+'")';curVals[id]=url;uploadedImages[id]=fn;const inp=document.getElementById('cinput-'+id);if(inp)inp.value='url("[Gambar: '+fn+'"]")';applyCardCSS(id,url);window._toast('Gambar berhasil dimuat!')};r.readAsDataURL(input.files[0])}};
function resetAll(){allItems.forEach(it=>{curVals[it.id]=orig[it.id]});Object.keys(uploadedImages).forEach(k=>delete uploadedImages[k]);if(cardOpen)openCard(selectedId);window._toast('Semua properti direset')}
document.getElementById('resetBtn').onclick=resetAll;
let toastT=null;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1500)}window._toast=toast;
let flyTarget=null,flying=false;function flyTo(pos){flyTarget=pos.clone();flying=true;controls.autoRotate=false}function updateFly(){if(!flying||!flyTarget)return;camera.position.lerp(flyTarget.clone().add(new THREE.Vector3(0,4,12)),.04);controls.target.lerp(flyTarget,.04);if(camera.position.distanceTo(flyTarget.clone().add(new THREE.Vector3(0,4,12)))<.5)flying=false}

/* ================================================================
   TOMBOL M — GalaxySlide Border → buka #1
   ================================================================ */
function goToFirst(){
  Snd.ia();
  if(presMode)stopPresentation();
  playGalaxySlide(0,1,1);
}
document.getElementById('mBtn').onclick=goToFirst;

/* ================================================================
   KLIK PLANET — GalaxySlide jika masuk kelompok Border
   ================================================================ */
function handlePlanetClick(clickId){
  if(isTransitioning)return;
  const clickGIdx=getItemGroupIdx(clickId);

  /* Jika klik planet kelompok Border dan belum ada kartu Border terbuka → slide */
  if(clickGIdx===0 && needsSlideForGroup(0)){
    playGalaxySlide(0,clickId,1);
  }else{
    /* Selain itu, buka kartu normal */
    Snd.ia();Snd.click();
    openCard(clickId);
  }
}

canvas.addEventListener('click',e=>{
  if(presMode||isTransitioning)return;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(planets.map(p=>p.mesh));
  if(hits.length>0)handlePlanetClick(hits[0].object.userData.id);
});
canvas.addEventListener('touchend',e=>{
  if(presMode||isTransitioning||!e.changedTouches.length)return;
  const tc=e.changedTouches[0];mouse.x=(tc.clientX/innerWidth)*2-1;mouse.y=-(tc.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(planets.map(p=>p.mesh));
  if(hits.length>0)handlePlanetClick(hits[0].object.userData.id);
});

/* ================================================================
   PRESENTASI MODE
   ================================================================ */
let presMode=false,presIdx=0,presTimer=null;
const pinfo=document.getElementById('pinfo'),picnt=document.getElementById('picnt'),piname=document.getElementById('piname'),pigrp=document.getElementById('pigrp');
function startPresentation(){Snd.ia();Snd.whoosh();presMode=true;presIdx=0;if(cardOpen)closeCard();controls.autoRotate=false;document.getElementById('micon').className='fas fa-pause';document.getElementById('mlbl').textContent='Hentikan Presentasi';pinfo.classList.add('show');showPresItem();presTimer=setInterval(()=>{presIdx++;if(presIdx>=45){stopPresentation();return}if(presIdx>0&&isGroupBoundary(allItems[presIdx-1].id,allItems[presIdx].id))window._toast('\u2728 '+allItems[presIdx].gt);showPresItem()},4500)}
function stopPresentation(){presMode=false;clearInterval(presTimer);document.getElementById('micon').className='fas fa-play';document.getElementById('mlbl').textContent='Mulai Presentasi';pinfo.classList.remove('show');controls.autoRotate=true}
function showPresItem(){const it=allItems[presIdx];const pp=planets[presIdx];picnt.textContent=(presIdx+1)+'/45';piname.textContent=it.p;pigrp.textContent=it.gt;piname.style.color=it.gc;flyTo(pp.mesh.position);pp.mesh.material.emissiveIntensity=1.5;setTimeout(()=>{if(!cardOpen||selectedId!==it.id)pp.mesh.material.emissiveIntensity=pp.mesh.userData.baseEmissive},3000)}
function toggleMode(){Snd.ia();if(presMode)stopPresentation();else startPresentation()}
document.getElementById('mode-btn').onclick=toggleMode;

/* ================================================================
   SAVE/LOAD/SHARE
   ================================================================ */
function saveConstellation(){const data={};allItems.forEach(it=>{data[it.id]=curVals[it.id];if(uploadedImages[it.id])data[it.id+'_fn']=uploadedImages[it.id]});localStorage.setItem('cssuniverse',JSON.stringify(data));toast('Constellation tersimpan!')}
function loadConstellation(data){if(!data)return;Object.keys(data).forEach(k=>{if(k.endsWith('_fn'))uploadedImages[parseInt(k)]=data[k];else curVals[parseInt(k)]=data[k]});if(cardOpen)openCard(selectedId);toast('Constellation dimuat!')}
document.getElementById('saveBtn').onclick=saveConstellation;
document.getElementById('loadBtn').onclick=function(){const raw=localStorage.getItem('cssuniverse');if(raw)loadConstellation(JSON.parse(raw));else toast('Belum ada data tersimpan')};
function showShareModal(){const data={};allItems.forEach(it=>data[it.id]=curVals[it.id]);document.getElementById('surl').value=location.origin+location.pathname+'#c='+btoa(JSON.stringify(data)).slice(0,200);document.getElementById('smodal').classList.add('show')}
function closeShareModal(){document.getElementById('smodal').classList.remove('show')}
document.getElementById('shareBtn').onclick=showShareModal;document.getElementById('closeSM').onclick=closeShareModal;document.getElementById('smodal').onclick=function(e){if(e.target===this)closeShareModal()};
document.getElementById('copyBtn').onclick=function(){document.getElementById('surl').select();navigator.clipboard.writeText(document.getElementById('surl').value).then(()=>toast('Link berhasil dicopy!')).catch(()=>toast('Gagal copy'))};

document.getElementById('backBtn').onclick=function(){Snd.ia();Snd.warp();const cv=document.createElement('canvas');cv.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none';document.body.appendChild(cv);const ctx=cv.getContext('2d'),W=cv.width=innerWidth,H=cv.height=innerHeight,cx=W/2,cy=H/2;const sts=[];for(let i=0;i<400;i++)sts.push({x:(Math.random()-.5)*W*2,y:(Math.random()-.5)*H*2,z:Math.random()*W});const st=performance.now();function fr(){const t=(performance.now()-st)/1200;if(t>1){location.href='Pengertian.html';return}const sp=2+Math.pow(t,4)*100;ctx.fillStyle='rgba(12,10,20,'+Math.min(1,t*2.5)+')';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';for(let i=0;i<sts.length;i++){const s=sts[i];s.z-=sp;if(s.z<=0){s.x=(Math.random()-.5)*W*2;s.y=(Math.random()-.5)*H*2;s.z=W}const k=128/s.z,px=s.x*k+cx,py=s.y*k+cy;if(px>=0&&px<=W&&py>=0&&py<=H){ctx.beginPath();ctx.arc(px,py,(1-s.z/W)*3,0,Math.PI*2);ctx.fill()}}requestAnimationFrame(fr)}requestAnimationFrame(fr)};

if(location.hash.startsWith('#c=')){try{const raw=atob(location.hash.slice(3));const data=JSON.parse(raw);if(data)Object.keys(data).forEach(id=>{curVals[parseInt(id)]=data[id]});history.replaceState(null,'',location.pathname)}catch(e){}}

/* ================================================================
   INPUT
   ================================================================ */
canvas.addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;xhair.style.left=e.clientX+'px';xhair.style.top=e.clientY+'px'});
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key==='Escape'&&cardOpen&&!isTransitioning){closeCard();return}if(e.key==='ArrowRight'&&cardOpen){nextProperty();return}if(e.key==='ArrowLeft'&&cardOpen){prevProperty();return}if(e.key===' '){e.preventDefault();toggleMode();return}if(e.key==='m'||e.key==='M'){e.preventDefault();goToFirst();return}if(e.key==='p'||e.key==='P'){e.preventDefault();document.getElementById('backBtn').click();return}if(cardOpen&&!isTransitioning&&selectedId>=0){const n=parseInt(e.key);if(n>=1&&n<=5){const it=findIt(selectedId);if(it&&it.h&&n<=it.h.length){Snd.click();window._clickChip(selectedId,it.h[n-1])}}}});
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight)});

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
const clock=new THREE.Clock();let mmFrame=0;
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();controls.update();updateFly();planets.forEach(pl=>{pl.mesh.rotation.y+=.004;if(pl.ring)pl.ring.rotation.z+=.002});raycaster.setFromCamera(mouse,camera);const hits=raycaster.intersectObjects(planets.map(p=>p.mesh));if(hits.length>0&&!presMode&&!isTransitioning){const hov=hits[0].object;if(hoveredPlanet!==hov){if(hoveredPlanet)hoveredPlanet.material.emissiveIntensity=hoveredPlanet.userData.baseEmissive;hoveredPlanet=hov;hov.material.emissiveIntensity=Math.max(hov.material.emissiveIntensity,.8)}xhair.classList.add('near');canvas.style.cursor='pointer'}else{if(hoveredPlanet&&!cardOpen)hoveredPlanet.material.emissiveIntensity=hoveredPlanet.userData.baseEmissive;hoveredPlanet=null;xhair.classList.remove('near');canvas.style.cursor='grab'}starsMesh.material.opacity=.55+Math.sin(t*2)*.15;pl1.position.x=-40+Math.sin(t*.3)*20;pl2.position.z=-40+Math.cos(t*.25)*20;planets.forEach((pl,i)=>{const pos=pl.mesh.position.clone();pos.y+=pl.mesh.userData.baseScale+1.2;pos.project(camera);const el=labelEls[i];if(pos.z>1){el.style.opacity='0';return}el.style.left=((pos.x*.5+.5)*innerWidth)+'px';el.style.top=(-(pos.y*.5)+.5)*innerHeight+'px';const dist=camera.position.distanceTo(pl.mesh.position);const op=Math.max(0,Math.min(1,1-(dist-10)/200));el.style.opacity=cardOpen&&selectedId===pl.it.id?'1':String(op*.7);if(cardOpen&&selectedId!==pl.it.id)el.style.opacity=String(op*.3)});mmFrame++;if(mmFrame%3===0)drawMinimap();composer.render()}

const lbar=document.getElementById('lbar');let loadProg=0;const loadInt=setInterval(()=>{loadProg+=8+Math.random()*15;if(loadProg>100)loadProg=100;lbar.style.width=loadProg+'%';if(loadProg>=100){clearInterval(loadInt);setTimeout(()=>{document.getElementById('loader').classList.add('done');animate()},400)}},120);
document.addEventListener('click',function once(){Snd.ia();document.removeEventListener('click',once)},{once:true});
</script>
</body>
