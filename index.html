<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentasi 50 Properti CSS + Value</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#F8F7F4;--card:#fff;--text:#1A1A1A;--muted:#71717A;--border:#E5E5E5;--input-bg:#F4F4F5;--accent:#0891B2;--code-bg:#FAFAF9}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.025) 1px,transparent 0);background-size:22px 22px;color:var(--text);line-height:1.6;padding-bottom:80px}
    header{background:linear-gradient(135deg,#1A1A1A,#2A2A2A);color:#fff;padding:22px 20px 18px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.18)}
    header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
    header h1 span{color:var(--accent)}
    header .sub{font-size:15px;opacity:.75;margin-top:8px;font-weight:600}
    header .members{font-size:12px;opacity:.4;margin-top:6px;line-height:1.8}
    .reset-all{margin-top:10px;padding:5px 16px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
    .reset-all:hover{background:var(--accent);border-color:var(--accent)}
    main{max-width:720px;margin:0 auto;padding:16px}
    .group-title{font-size:13px;font-weight:700;padding:8px 14px;color:#fff;margin:26px 0 8px;border-radius:7px;letter-spacing:.4px;text-transform:uppercase}
    .group-title:first-child{margin-top:8px}
    .item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:box-shadow .2s}
    .item:hover{box-shadow:inset 3px 0 0 var(--item-accent,var(--accent)),0 2px 10px rgba(0,0,0,.04)}
    .item-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--code-bg);border-bottom:1px solid var(--border);transition:background .2s}
    .item-header.mod{background:rgba(8,145,178,.06)}
    .item-num{width:26px;height:26px;border-radius:6px;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace}
    .item-code{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text);font-weight:600;word-break:break-all;line-height:1.4}
    .item-code .pn{color:var(--accent)}
    .item-desc{font-size:12px;color:var(--muted);padding:0 14px 7px;line-height:1.5;border-bottom:1px solid var(--border);background:var(--code-bg)}
    .item-controls{display:flex;align-items:center;padding:7px 14px;gap:8px;border-bottom:1px solid var(--border)}
    .item-controls label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}
    .item-controls input[type=text]{flex:1;font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;min-width:0}
    .item-controls input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
    .rbtn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;flex-shrink:0}
    .rbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .rbtn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
    .hints{display:flex;flex-wrap:wrap;gap:5px;padding:6px 14px 8px;border-bottom:1px solid var(--border);background:#FEFDFB}
    .hints span.lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;align-self:center;margin-right:2px}
    .chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:#fff;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap}
    .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px)}
    .chip:active{transform:translateY(0)}
    .demo{padding:14px;min-height:48px;font-size:14px;position:relative}
    .demo-wrap{border:2px dashed #D4D4D8;border-radius:6px;min-height:56px;padding:8px}
    .demo-child{padding:10px;border-radius:4px;transition:all .15s}
    .empty-note{font-size:12px;color:var(--muted);font-style:italic}
    .sticky-scroll{height:130px;overflow:auto;border:1px solid #D4D4D8;border-radius:6px}
    .sticky-scroll::-webkit-scrollbar{width:6px}
    .sticky-scroll::-webkit-scrollbar-thumb{background:#D4D4D8;border-radius:3px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    @media(max-width:600px){main{padding:10px 8px}header h1{font-size:17px}header{padding:16px 12px 14px}.item-code{font-size:11px}.item-controls input[type=text]{font-size:11px;padding:5px 8px}.item-num{width:22px;height:22px;font-size:10px}.chip{font-size:10px;padding:2px 7px}}
  </style>
</head>

  <button class="reset-all" onclick="resetAll()"><i class="fas fa-rotate-left"></i>&ensp;Reset Semua</button>
</header>

<main id="app"></main>

{id:50,p:"overflow-y",v:"auto",tx:"Teks yang kepanjangan akan disembunyikan tapi bisa di-scroll ke bawah untuk membaca sisa teksnya.",b:"width:200px;height:60px;background:#f0f0f0;border-radius:6px;",h:["visible","hidden","scroll","auto"]}
]}
];

var orig={};
for(var gi=0;gi<G.length;gi++)for(var ii=0;ii<G[gi].items.length;ii++)orig[G[gi].items[ii].id]=G[gi].items[ii].v;
var fixedEl=null;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
var toastT=null;
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show')},1500)}
function findItem(id){for(var g=0;g<G.length;g++)for(var i=0;i<G[g].items.length;i++)if(G[g].items[i].id===id)return G[g].items[i];return null}

function applyCSS(id,val){
  var it=findItem(id);if(!it)return;
  if(it.tp==='child'){
    var el=document.getElementById('tgt-'+id),note=document.getElementById('note-'+id);
    if(el)el.style.cssText=(it.cb||'')+it.p+':'+val+';';
    if(note)note.style.display=(it.p==='display'&&val==='none')?'':'none';
  }else if(it.tp==='inline'){
    var spans=document.querySelectorAll('.inl-'+id);
    for(var i=0;i<spans.length;i++)spans[i].style.display=val;
  }else if(it.tp==='fixed'){
    if(fixedEl){fixedEl.remove();fixedEl=null}
    if(val==='fixed'){fixedEl=document.createElement('div');fixedEl.id='tgt-'+id;fixedEl.textContent='position: fixed';fixedEl.style.cssText='position:fixed;bottom:16px;right:16px;background:#1A1A1A;color:white;padding:8px 16px;font-size:12px;border-radius:6px;z-index:99;font-family:JetBrains Mono,monospace;';document.body.appendChild(fixedEl)}
    var note=document.getElementById('note-'+id);if(note)note.style.display=(val==='fixed')?'none':'';
  }else if(it.tp==='sticky'){
    var el=document.getElementById('tgt-'+id);if(el)el.style.position=val;
    var note=document.getElementById('note-'+id);if(note)note.style.display=(val==='sticky')?'none':'';
  }else if(it.tp==='zindex'){
    var el=document.getElementById('tgt-'+id+'b');if(el)el.style.zIndex=val;
  }else if(it.tp==='float'){
    var el=document.getElementById('tgt-'+id);if(el)el.style.float=val;
  }else if(it.tp==='fc'||it.tp==='fx'){
    var el=document.getElementById('tgt-'+id);if(el)el.style.setProperty(it.p,val);
  }else{
    var el=document.getElementById('tgt-'+id);if(el)el.style.cssText=(it.b||'')+it.p+':'+val+';';
  }
  var hdr=document.getElementById('hdr-'+id);if(hdr){if(val!==orig[id])hdr.classList.add('mod');else hdr.classList.remove('mod')}
}

function resetOne(id){var inp=document.getElementById('inp-'+id);if(inp)inp.value=orig[id];applyCSS(id,orig[id]);toast('Properti #'+id+' direset')}
function resetAll(){for(var id in orig){var inp=document.getElementById('inp-'+id);if(inp)inp.value=orig[id];applyCSS(id,orig[id])}toast('Semua properti direset')}
function onInput(id,val){applyCSS(id,val);var it=findItem(id);if(it){var c=document.querySelector('#hdr-'+id+' .item-code');if(c)c.innerHTML='<span class="pn">'+esc(it.p)+'</span>: '+esc(val)+';'}}
function clickChip(id,val){var inp=document.getElementById('inp-'+id);if(inp)inp.value=val;onInput(id,val)}

function makeBoxHTML(box,isTarget,id,prop,val){
  var hs=box.h?'height:'+box.h+';':'';
  var fs=box.fs?'font-size:'+box.fs+';':'';
  var bs='width:'+box.w+';'+hs+fs+'background:'+box.c+';border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;';
  if(isTarget){
    bs+=prop+':'+val+';outline:2px dashed rgba(0,0,0,0.25);outline-offset:2px;';
    return '<div id="tgt-'+id+'" style="'+bs+'">'+box.l+'</div>';
  }
  return '<div style="'+bs+'">'+box.l+'</div>';
}

function renderDemo(it){
  var id=it.id,b=it.b||'';
  switch(it.tp){
    case'child':
      var isNone=(it.p==='display'&&it.v==='none');
      return '<div class="demo demo-wrap" style="'+b+'"><div class="demo-child" id="tgt-'+id+'" style="'+(it.cb||'')+it.p+':'+it.v+';">'+it.tx+'</div><span class="empty-note" id="note-'+id+'" style="'+(isNone?'':'display:none')+'">(elemen tersembunyi \u2014 coba ubah value-nya)</span></div>';
    case'inline':
      var h='<div class="demo">',bgs=['background:#FEF08A;','background:#BAE6FD;'];
      for(var j=0;j<it.tx.length;j++)h+='<span class="inl-'+id+'" style="'+bgs[j]+'padding:5px 10px;border-radius:4px;display:'+it.v+';">'+it.tx[j]+'</span> ';
      return h+'</div>';
    case'fixed':
      return '<div class="demo" style="min-height:50px"><span class="empty-note" id="note-'+id+'" style="display:none">Elemen ini muncul di pojok kanan bawah layar. Coba ubah value menjadi "static" atau "relative".</span></div>';
    case'sticky':
      return '<div class="sticky-scroll"><div style="padding:6px 12px;font-size:11px;color:#999;background:#f9f9f9;border-bottom:1px solid #eee">&#8593; Scroll ke bawah untuk melihat efek sticky &#8595;</div><div id="tgt-'+id+'" style="position:'+it.v+';top:0;background:#06B6D4;color:white;padding:10px;font-weight:600;">'+it.tx+'</div><div style="height:120px;background:repeating-linear-gradient(transparent,transparent 19px,#e5e5e5 19px,#e5e5e5 20px);padding:8px 12px;font-size:11px;color:#aaa;">(konten isi agar bisa di-scroll)</div></div>';
    case'zindex':
      return '<div class="demo demo-wrap" style="position:relative;height:80px;"><div style="position:absolute;top:10px;left:10px;width:80px;height:50px;background:#EF4444;border-radius:4px;z-index:1;"></div><div id="tgt-'+id+'b" style="position:absolute;top:20px;left:30px;width:80px;height:50px;background:#3B82F6;color:white;padding:8px;border-radius:4px;font-size:12px;font-weight:600;z-index:'+it.v+';">'+it.tx+'</div></div>';
    case'float':
      return '<div class="demo demo-wrap" style="overflow:hidden;"><div id="tgt-'+id+'" style="float:'+it.v+';width:100px;height:60px;background:#06B6D4;border-radius:4px;margin-right:10px;"></div><span>'+it.tx+'</span></div>';
    case'fc':
      var bh='';
      for(var j=0;j<it.bx.length;j++) bh+=makeBoxHTML(it.bx[j],false,id,it.p,it.v);
      return '<div class="demo"><div id="tgt-'+id+'" style="'+b+it.p+':'+it.v+';">'+bh+'</div></div>';
    case'fx':
      var bh='';
      for(var j=0;j<it.bx.length;j++) bh+=makeBoxHTML(it.bx[j],!!it.bx[j].t,id,it.p,it.v);
      return '<div class="demo"><div style="'+it.cb+'">'+bh+'</div></div>';
    default:
      return '<div class="demo"><div id="tgt-'+id+'" style="'+b+it.p+':'+it.v+';">'+it.tx+'</div></div>';
  }
}

function render(){
  var html='';
  for(var g=0;g<G.length;g++){
    var grp=G[g];
    html+='<div class="group-title" style="background:'+grp.c+'">'+grp.t+'</div>';
    for(var i=0;i<grp.items.length;i++){
      var it=grp.items[i];
      html+='<div class="item" style="--item-accent:'+grp.c+'">';
      html+='<div class="item-header" id="hdr-'+it.id+'">';
      html+='<div class="item-num" style="background:'+grp.c+'">'+it.id+'</div>';
      html+='<div class="item-code"><span class="pn">'+esc(it.p)+'</span>: '+esc(it.v)+';</div>';
      html+='</div>';
      if(it.d) html+='<div class="item-desc"><i class="fas fa-circle-info" style="margin-right:4px;opacity:.5"></i>'+it.d+'</div>';
      html+='<div class="item-controls">';
      html+='<label>Value</label>';
      html+='<input type="text" id="inp-'+it.id+'" value="'+esc(it.v)+'" oninput="onInput('+it.id+',this.value)">';
      html+='<button class="rbtn" onclick="resetOne('+it.id+')" title="Reset"><i class="fas fa-rotate-left"></i></button>';
      html+='</div>';
      if(it.h&&it.h.length){
        html+='<div class="hints"><span class="lbl">Coba:</span>';
        for(var j=0;j<it.h.length;j++){
          var cv=it.h[j].replace(/'/g,"\\'");
          html+='<span class="chip" onclick="clickChip('+it.id+',\''+cv+'\')">'+esc(it.h[j])+'</span>';
        }
        html+='</div>';
      }
      html+=renderDemo(it);
      html+='</div>';
    }
  }
  document.getElementById('app').innerHTML=html;
  for(var id in orig)applyCSS(id,orig[id]);
}

render();
</script>

</body>
</html>
